<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Personale</title>

<style>
/* ======================
   CSS VARIABLES
====================== */
:root {
  --primary: #4f46e5;
  --bg: #f4f6fb;
  --card: #ffffff;
  --text: #222;
  --radius: 12px;
  --space: 1rem;
  --transition: 0.2s ease;
}

[data-theme="dark"] {
  --bg: #111827;
  --card: #1f2937;
  --text: #f9fafb;
}

/* ======================
   BASE
====================== */
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: var(--transition);
}

img { max-width: 100%; }

a { text-decoration: none; color: inherit; }

button {
  cursor: pointer;
  border: none;
  padding: 0.6rem 1rem;
  border-radius: var(--radius);
  background: var(--primary);
  color: white;
  transition: var(--transition);
}

button:hover { opacity: 0.85; }
button:focus { outline: 3px solid #aaa; }

input, select {
  padding: 0.5rem;
  border-radius: var(--radius);
  border: 1px solid #ccc;
}

input:focus { outline: 2px solid var(--primary); }

header {
  background: var(--card);
  padding: var(--space);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav {
  display: none;
  flex-direction: column;
  gap: 0.5rem;
}

nav a {
  padding: 0.5rem;
}

.hamburger {
  font-size: 1.5rem;
  background: none;
  color: var(--text);
}

main {
  padding: var(--space);
}

section {
  margin-bottom: 2rem;
}

.card {
  background: var(--card);
  padding: var(--space);
  border-radius: var(--radius);
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  transition: var(--transition);
}

.card:hover {
  transform: translateY(-3px);
}

.grid {
  display: grid;
  gap: 1rem;
}

footer {
  text-align: center;
  padding: 1rem;
  font-size: 0.8rem;
}

/* Modal */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: var(--card);
  padding: 2rem;
  border-radius: var(--radius);
  max-width: 400px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--primary);
  color: white;
  padding: 1rem;
  border-radius: var(--radius);
  display: none;
}

/* ======================
   BREAKPOINTS
====================== */
@media (min-width: 768px) {
  nav {
    display: flex !important;
    flex-direction: row;
  }
  .hamburger { display: none; }

  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1024px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>
</head>

<body>

<header>
  <h1>MyDashboard</h1>
  <button class="hamburger" aria-label="Apri menu">☰</button>
  <nav aria-label="Navigazione principale">
    <a href="#home">Home</a>
    <a href="#attivita">Attività</a>
    <a href="#profilo">Profilo</a>
    <button id="toggleTheme">Tema</button>
  </nav>
</header>

<main>

<section id="home">
  <h2>Statistiche</h2>
  <div class="grid" id="stats"></div>
</section>

<section id="attivita">
  <h2>Le tue Attività</h2>

  <input type="text" id="search" placeholder="Cerca attività..." aria-label="Cerca attività">
  
  <select id="sort">
    <option value="">Ordina per</option>
    <option value="name">Nome</option>
    <option value="date">Data</option>
  </select>

  <button id="reset">Reset</button>

  <div class="grid" id="taskList"></div>
  <button id="loadMore">Carica altro</button>
</section>

<section id="profilo">
  <h2>Profilo</h2>
  <form id="profileForm" novalidate>
    <label>
      Nome:
      <input type="text" id="name" required>
    </label>
    <small class="error"></small>

    <label>
      Email:
      <input type="email" id="email" required>
    </label>
    <small class="error"></small>

    <button type="submit">Salva</button>
  </form>
</section>

</main>

<footer>
  © 2026 Dashboard Demo
</footer>

<div class="modal" id="modal" role="dialog" aria-modal="true">
  <div class="modal-content">
    <p id="modalText"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ======================
   DATA
====================== */
const tasks = [
  { name: "Studiare JavaScript", date: "2026-03-01" },
  { name: "Allenamento", date: "2026-03-02" },
  { name: "Leggere un libro", date: "2026-03-03" },
  { name: "Progetto web", date: "2026-03-04" },
  { name: "Meditazione", date: "2026-03-05" }
];

let visible = 3;

/* ======================
   ELEMENTI
====================== */
const taskList = document.getElementById("taskList");
const searchInput = document.getElementById("search");
const sortSelect = document.getElementById("sort");
const resetBtn = document.getElementById("reset");
const loadMoreBtn = document.getElementById("loadMore");
const modal = document.getElementById("modal");
const modalText = document.getElementById("modalText");
const toast = document.getElementById("toast");

/* ======================
   FUNZIONI
====================== */

function renderTasks(data) {
  taskList.innerHTML = "";
  data.slice(0, visible).forEach(task => {
    if (!task || !task.name) return;

    const card = document.createElement("div");
    card.className = "card";

    const title = document.createElement("h3");
    title.textContent = task.name;

    const date = document.createElement("p");
    date.textContent = task.date;

    const btn = document.createElement("button");
    btn.textContent = "Dettagli";
    btn.addEventListener("click", () => openModal(task.name));

    card.append(title, date, btn);
    taskList.appendChild(card);
  });
}

function openModal(text) {
  modalText.textContent = text;
  modal.style.display = "flex";
}

modal.addEventListener("click", e => {
  if (e.target === modal) modal.style.display = "none";
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape") modal.style.display = "none";
});

function showToast(message) {
  toast.textContent = message;
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 2000);
}

/* ======================
   EVENTI
====================== */

searchInput.addEventListener("input", () => {
  const value = searchInput.value.toLowerCase();
  const filtered = tasks.filter(t => t.name.toLowerCase().includes(value));
  renderTasks(filtered);
});

sortSelect.addEventListener("change", () => {
  let sorted = [...tasks];
  if (sortSelect.value === "name") {
    sorted.sort((a,b)=> a.name.localeCompare(b.name));
  }
  if (sortSelect.value === "date") {
    sorted.sort((a,b)=> new Date(a.date) - new Date(b.date));
  }
  renderTasks(sorted);
});

resetBtn.addEventListener("click", () => {
  searchInput.value = "";
  sortSelect.value = "";
  visible = 3;
  renderTasks(tasks);
});

loadMoreBtn.addEventListener("click", () => {
  visible += 2;
  renderTasks(tasks);
});

/* ======================
   FORM VALIDAZIONE
====================== */
document.getElementById("profileForm").addEventListener("submit", e => {
  e.preventDefault();
  let valid = true;

  const name = document.getElementById("name");
  const email = document.getElementById("email");

  if (!name.value.trim()) {
    name.nextElementSibling.textContent = "Nome obbligatorio";
    valid = false;
  } else name.nextElementSibling.textContent = "";

  if (!email.value.includes("@")) {
    email.nextElementSibling.textContent = "Email non valida";
    valid = false;
  } else email.nextElementSibling.textContent = "";

  if (valid) {
    localStorage.setItem("profileName", name.value);
    localStorage.setItem("profileEmail", email.value);
    showToast("Profilo salvato!");
  }
});

/* ======================
   TEMA DARK/LIGHT
====================== */
const toggleTheme = document.getElementById("toggleTheme");
toggleTheme.addEventListener("click", () => {
  const current = document.documentElement.getAttribute("data-theme");
  const newTheme = current === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", newTheme);
  localStorage.setItem("theme", newTheme);
});

window.addEventListener("load", () => {
  const savedTheme = localStorage.getItem("theme");
  if (savedTheme) document.documentElement.setAttribute("data-theme", savedTheme);
  renderTasks(tasks);
});

/* ======================
   NAVBAR RESPONSIVE
====================== */
const hamburger = document.querySelector(".hamburger");
const nav = document.querySelector("nav");

hamburger.addEventListener("click", () => {
  nav.style.display = nav.style.display === "flex" ? "none" : "flex";
});
</script>

</body>
</html>
