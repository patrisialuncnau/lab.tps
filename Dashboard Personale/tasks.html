<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ My Daily Sparkle | Obiettivi</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ================= STILE CONDIVISO ================= */
        :root { --bg-gradient: linear-gradient(135deg, #fdf5f6 0%, #fce4ec 100%); --card-bg: rgba(255, 255, 255, 0.95); --text-main: #4a3b3c; --text-muted: #8a7375; --gold-primary: #d4af37; --gold-hover: #b5952f; --gold-light: #f9f1d8; --pink-accent: #f48fb1; --pink-light: #f8bbd0; --font-heading: 'Playfair Display', serif; --font-body: 'Poppins', sans-serif; --shadow-soft: 0 10px 25px rgba(244, 143, 177, 0.15); --shadow-gold: 0 4px 15px rgba(212, 175, 55, 0.2); --transition: all 0.4s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: var(--font-body); background: var(--bg-gradient); color: var(--text-main); line-height: 1.7; min-height: 100vh; } a { text-decoration: none; color: inherit; } ul { list-style: none; } h1, h2, h3 { font-family: var(--font-heading); color: var(--gold-primary); }
        .navbar { background: var(--card-bg); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-soft); border-bottom: 2px solid var(--gold-primary); } .brand { font-family: var(--font-heading); font-weight: 700; font-size: 1.8rem; color: var(--gold-primary); } .nav-links { display: flex; gap: 2rem; } .nav-links a { font-weight: 500; color: var(--text-muted); text-transform: uppercase; font-size: 0.9rem; position: relative; transition: var(--transition); } .nav-links a:hover, .nav-links a.active { color: var(--gold-primary); } .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--gold-primary); transition: var(--transition); } .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        main { padding: 2rem 1rem; max-width: 1200px; margin: 0 auto; } .card { background: var(--card-bg); border-radius: 16px; padding: 2rem; box-shadow: var(--shadow-soft); border-top: 4px solid var(--gold-primary); position: relative; transition: var(--transition); } .card::before { content: '✨'; position: absolute; top: 10px; right: 15px; opacity: 0.2; font-size: 2rem; } .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-gold); }
        
        /* STILI SPECIFICI TASKS */
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; } .input-group label { font-family: var(--font-heading); font-style: italic; color: var(--gold-primary); } .input-group input, .input-group select { padding: 1rem; border-radius: 16px; border: 2px solid var(--pink-light); background: rgba(255,255,255, 0.8); font-family: var(--font-body); }
        .badge { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; } .badge.high { background: #ffebee; color: #e57373; border: 1px solid #e57373; } .badge.medium { background: var(--gold-light); color: var(--gold-hover); border: 1px solid var(--gold-primary); } .badge.low { background: #e8f5e9; color: #81c784; border: 1px solid #81c784; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="brand">✨ Daily Sparkle</div>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="tasks.html" class="active">Obiettivi</a></li>
                <li><a href="profile.html">Diario</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div style="display: flex; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 3rem; background: rgba(255,255,255,0.7); padding: 1.5rem; border-radius: 24px; border: 1px solid var(--pink-light);">
            <div class="input-group" style="flex: 1; min-width: 200px;">
                <label>Cerca ispirazione...</label>
                <input type="text" id="search-task" placeholder="Es. Workout, skincare...">
            </div>
            <div class="input-group" style="min-width: 150px;">
                <label>Categoria</label>
                <select id="filter-status">
                    <option value="all">Tutte le magie</option>
                    <option value="todo">Da iniziare</option>
                    <option value="completed">Completate 👑</option>
                </select>
            </div>
        </div>

        <section class="task-grid" id="task-container"></section>
    </main>

    <script>
        const defaultData = {
            tasks: [
                { id: 1, title: 'Morning Routine ✨', desc: 'Skincare, meditazione (10 min) e colazione sana.', priority: 'high', status: 'todo', date: '2026-05-13' },
                { id: 2, title: 'Revisione Budget Mensile 📊', desc: 'Controllare le spese.', priority: 'medium', status: 'in-progress', date: '2026-05-14' },
                { id: 3, title: 'Workout Gambe 🏋️‍♀️', desc: 'Scheda B in palestra.', priority: 'high', status: 'completed', date: '2026-05-12' },
                { id: 4, title: 'Preparare Outfit', desc: 'Scegliere i vestiti per domenica.', priority: 'low', status: 'todo', date: '2026-05-15' }
            ]
        };
        
        let appState = JSON.parse(localStorage.getItem('lifeDashboardGlow')) || defaultData;
        
        function renderTasks(tasks) {
            const container = document.getElementById('task-container');
            container.innerHTML = tasks.length ? '' : '<p>Nessuna attività trovata 🎀</p>';
            tasks.forEach(task => {
                container.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
                            <h3>${task.title}</h3>
                            <span class="badge ${task.priority}">${task.priority}</span>
                        </div>
                        <p class="text-muted">${task.desc}</p>
                        <div style="margin-top:1.5rem; font-size:0.9rem;">🗓 ${task.date} | <strong>Stato:</strong> ${task.status}</div>
                    </div>`;
            });
        }

        function filterTasks() {
            const query = document.getElementById('search-task').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            const filtered = appState.tasks.filter(t => 
                (t.title.toLowerCase().includes(query) || t.desc.toLowerCase().includes(query)) &&
                (status === 'all' || t.status === status)
            );
            renderTasks(filtered);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTasks(appState.tasks);
            document.getElementById('search-task').addEventListener('input', filterTasks);
            document.getElementById('filter-status').addEventListener('change', filterTasks);
        });
    </script>
</body>
</html>
