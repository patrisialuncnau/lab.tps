<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ My Daily Sparkle | Diario</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="brand">✨ Daily Sparkle</div>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="tasks.html">Obiettivi</a></li>
                <li><a href="profile.html" class="active">Diario</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem;">
            
            <section class="card" style="text-align: center;">
                <div style="width: 120px; height: 120px; margin: 0 auto 1.5rem auto; background: var(--gold-light); border: 4px solid var(--gold-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; box-shadow: var(--shadow-gold);">
                    👑
                </div>
                <h2>Il tuo Profilo</h2>
                <p class="text-muted" style="margin-bottom: 2rem;">Sogna in grande, brilla sempre.</p>
                
                <div style="text-align: left;">
                    <div class="input-group">
                        <label>Nome Stile</label>
                        <input type="text" value="Utente Radiosa" readonly>
                    </div>
                    <div class="input-group">
                        <label>Mantra Personale</label>
                        <input type="text" value="Attiro solo energia positiva ✨" readonly>
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>Il tuo Diario Segreto 📔</h2>
                <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 1.5rem;">I tuoi pensieri vengono salvati magicamente nel browser.</p>
                
                <textarea id="personal-notes" rows="12" style="width: 100%; padding: 1.5rem; border-radius: var(--radius-md); border: 2px solid var(--pink-light); background: #fffcfd; color: var(--text-main); font-family: var(--font-body); resize: vertical;" placeholder="Caro diario, oggi mi sento..."></textarea>
            </section>

        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
