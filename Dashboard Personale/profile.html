<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ My Daily Sparkle | Diario</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ================= STILE CONDIVISO ================= */
        :root { --bg-gradient: linear-gradient(135deg, #fdf5f6 0%, #fce4ec 100%); --card-bg: rgba(255, 255, 255, 0.95); --text-main: #4a3b3c; --text-muted: #8a7375; --gold-primary: #d4af37; --gold-hover: #b5952f; --gold-light: #f9f1d8; --pink-accent: #f48fb1; --pink-light: #f8bbd0; --font-heading: 'Playfair Display', serif; --font-body: 'Poppins', sans-serif; --shadow-soft: 0 10px 25px rgba(244, 143, 177, 0.15); --shadow-gold: 0 4px 15px rgba(212, 175, 55, 0.2); --transition: all 0.4s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: var(--font-body); background: var(--bg-gradient); color: var(--text-main); line-height: 1.7; min-height: 100vh; } a { text-decoration: none; color: inherit; } ul { list-style: none; } h1, h2, h3 { font-family: var(--font-heading); color: var(--gold-primary); }
        .navbar { background: var(--card-bg); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-soft); border-bottom: 2px solid var(--gold-primary); } .brand { font-family: var(--font-heading); font-weight: 700; font-size: 1.8rem; color: var(--gold-primary); } .nav-links { display: flex; gap: 2rem; } .nav-links a { font-weight: 500; color: var(--text-muted); text-transform: uppercase; font-size: 0.9rem; position: relative; transition: var(--transition); } .nav-links a:hover, .nav-links a.active { color: var(--gold-primary); } .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--gold-primary); transition: var(--transition); } .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        main { padding: 2rem 1rem; max-width: 1200px; margin: 0 auto; } .card { background: var(--card-bg); border-radius: 16px; padding: 2rem; box-shadow: var(--shadow-soft); border-top: 4px solid var(--gold-primary); position: relative; transition: var(--transition); } .card::before { content: '✨'; position: absolute; top: 10px; right: 15px; opacity: 0.2; font-size: 2rem; }
        
        /* STILI SPECIFICI DIARIO */
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; } .input-group label { font-family: var(--font-heading); font-style: italic; color: var(--gold-primary); } .input-group input, textarea { padding: 1rem; border-radius: 16px; border: 2px solid var(--pink-light); background: rgba(255,255,255, 0.8); font-family: var(--font-body); width: 100%; } textarea { resize: vertical; background: #fffcfd; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="brand">✨ Daily Sparkle</div>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="tasks.html">Obiettivi</a></li>
                <li><a href="profile.html" class="active">Diario</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem;">
            
            <section class="card" style="text-align: center;">
                <div style="width: 120px; height: 120px; margin: 0 auto 1.5rem auto; background: var(--gold-light); border: 4px solid var(--gold-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; box-shadow: var(--shadow-gold);">👑</div>
                <h2>Il tuo Profilo</h2>
                <p class="text-muted" style="margin-bottom: 2rem;">Sogna in grande, brilla sempre.</p>
                <div style="text-align: left;">
                    <div class="input-group"><label>Nome Stile</label><input type="text" value="Utente Radiosa" readonly></div>
                    <div class="input-group"><label>Mantra Personale</label><input type="text" value="Attiro solo energia positiva ✨" readonly></div>
                </div>
            </section>

            <section class="card">
                <h2>Il tuo Diario Segreto 📔</h2>
                <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 1.5rem;">I tuoi pensieri si salvano magicamente.</p>
                <textarea id="personal-notes" rows="12" placeholder="Caro diario, oggi mi sento..."></textarea>
            </section>

        </div>
    </main>

    <script>
        const STORAGE_KEY = 'lifeDashboardGlow';
        let appState = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { notes: '' };

        document.addEventListener('DOMContentLoaded', () => {
            const noteArea = document.getElementById('personal-notes');
            noteArea.value = appState.notes || '';
            
            noteArea.addEventListener('input', (e) => {
                appState.notes = e.target.value;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
            });
        });
    </script>
</body>
</html>
